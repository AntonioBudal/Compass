<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compass Local-First</title>
    
    <!-- ESCUDO ANTI-FOUC: Aplica o tema instantaneamente antes de desenhar o DOM -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('compass_theme');
          if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
    <title>Compass — Execução Tática</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
